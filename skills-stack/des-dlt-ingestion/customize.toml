[workflow]
name = "des-dlt-ingestion"
type = "stack-support"
primary_stack = "dlt"

[paths]
steps_dir = "steps"
references_dir = "references"
checklists_dir = "checklists"
templates_dir = "templates"
examples_dir = "examples"

[outputs]
ingestion_plan = "_des-output/implementation-artifacts/dlt-ingestion-plan.md"
source_resource_spec = "_des-output/implementation-artifacts/dlt-source-resource-spec.md"
incremental_state_spec = "_des-output/implementation-artifacts/dlt-incremental-state-spec.md"
schema_contract_spec = "_des-output/implementation-artifacts/dlt-schema-contract-spec.md"
ingestion_evidence = "_des-output/evidence/phase-08/dlt-ingestion-evidence.md"
