# Workflow customization surface for de-business-discovery.
# Overrides merge per BMad structural rules.

[workflow]
# Steps to run before the standard activation
activation_steps_prepend = []

# Steps to run after greet but before the workflow begins
activation_steps_append = []

# Persistent facts the workflow keeps in mind for the whole run
persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

# Scalar: executed when the workflow reaches its final step
on_complete = ""

[config]
# Default paths
output_file = "{project-root}/_des-output/planning-artifacts/01-business-discovery.md"
template_file = "{skill-root}/templates/business_discovery_template.md"
checklist_file = "{skill-root}/checklists/business_readiness_checklist.md"
status_file = "{project-root}/_des-output/implementation-artifacts/des-workflow-status.md"
