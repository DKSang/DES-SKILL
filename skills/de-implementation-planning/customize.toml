# Workflow customization surface for de-implementation-planning.

[workflow]
activation_steps_prepend = []
activation_steps_append = []

persistent_facts = [
  "file:{project-root}/**/project-context.md",
]

on_complete = ""

[config]
output_file = "{project-root}/_des-output/implementation-artifacts/implementation-plan.md"
status_file = "{project-root}/_des-output/implementation-artifacts/des-workflow-status.md"
