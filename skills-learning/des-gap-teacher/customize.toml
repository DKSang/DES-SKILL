[skill]
name = "des-gap-teacher"
type = "learning"
version = "0.1.0"

[workflow]
entry_step = "steps/step-01-context-and-evidence.md"
step_order = [
  "steps/step-01-context-and-evidence.md",
  "steps/step-02-diagnose-learning-gaps.md",
  "steps/step-03-feedback-and-handoff.md"
]

[paths]
soul_file = "SOUL.md"
concept_map_file = "knowledge/FUNDAMENTALS-MAP.md"
template_file = "templates/learning/learning-gap-report-template.md"
checklist_file = "skills-learning/des-gap-teacher/checklist.md"
learning_output_dir = ".agents/des-skill/output/learning"
source_artifact_dir = ".agents/des-skill/output"

[output]
file_suffix = "learning-gap-report.md"
language = "follow-user-language"
default_status = "Draft"

[diagnosis]
include_correct_understanding = true
include_missing_concepts = true
include_wrong_assumptions = true
include_artifact_impact = true
include_downstream_risk = true
include_study_actions = true
include_artifact_corrections = true

[severity]
levels = ["Low", "Medium", "High", "Blocking"]

[gap_categories]
categories = [
  "Conceptual Gap",
  "Artifact Gap",
  "Decision Gap",
  "Trade-off Gap",
  "Terminology Gap",
  "Lifecycle Connection Gap",
  "Governance / Quality Gap",
  "Evidence Gap"
]

[guardrails]
do_not_invent_user_understanding = true
do_not_claim_gap_without_evidence = true
do_not_modify_source_artifact = true
halt_on_missing_evidence = true
halt_on_missing_soul = true
halt_on_missing_concept_map = true
