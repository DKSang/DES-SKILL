[skill]
name = "des-wise"
type = "support"
version = "0.1.0"

[workflow]
entry_step = "steps/step-01-understand-user-intent.md"
step_order = [
  "steps/step-01-understand-user-intent.md",
  "steps/step-02-route-and-recommend.md",
  "steps/step-03-response-and-handoff.md"
]

[paths]
workflow_file = "DES-WORKFLOW.md"
artifacts_file = "ARTIFACTS.md"
readme_file = "README.md"
soul_file = "SOUL.md"
concept_map_file = "knowledge/FUNDAMENTALS-MAP.md"
workflow_status_file = "_des-output/implementation-artifacts/des-workflow-status.md"
learning_status_file = "_des-output/learning-artifacts/des-learning-status.md"
source_artifact_dir = "_des-output/planning-artifacts"
learning_output_dir = "_des-output/learning-artifacts"
template_file = "templates/support/des-wise-response-template.md"
checklist_file = "skills-support/des-wise/checklist.md"
optional_output_file = "_des-output/implementation-artifacts/des-wise-recommendation.md"

[output]
language = "follow-user-language"
default_mode = "direct-response"
save_recommendation_by_default = false

[routing]
prefer_one_primary_skill = true
include_alternatives = true
include_copy_paste_prompt = true
recommend_status_update_when_unknown = true
recommend_learning_status_when_learning_mode = true

[skill_families]
main_lifecycle = [
  "des-business-discovery",
  "des-business-question",
  "des-requirements-kpi",
  "des-data-product",
  "des-source-assessment",
  "des-domain-modeling",
  "des-architecture-design",
  "des-ingestion-design",
  "des-bronze-layer-design",
  "des-silver-layer-design",
  "des-gold-layer-design",
  "des-data-contract",
  "des-transformation-design",
  "des-data-quality",
  "des-orchestration-observability",
  "des-semantic-model",
  "des-serving-layer",
  "des-lineage-metadata",
  "des-governance-security",
  "des-cost-performance",
  "des-cicd-testing",
  "des-project-evaluation"
]

support = [
  "des-create-epic",
  "des-create-story",
  "des-sprint-planning",
  "des-story-readiness-check",
  "des-dev-task-breakdown",
  "des-implementation-plan",
  "des-code-review",
  "des-release-readiness-review",
  "des-retrospective",
  "des-correct-course",
  "des-workflow-status-update",
  "des-wise"
]

learning = [
  "des-explain-artifact",
  "des-artifact-quiz",
  "des-learning-path",
  "des-gap-teacher",
  "des-socratic-coach",
  "des-learning-status-update",
  "des-learning-review"
]

[guardrails]
do_not_invent_status = true
do_not_route_to_implementation_without_design_evidence = true
do_not_route_to_release_without_review_evidence = true
do_not_overwhelm_user_with_all_skills = true
halt_on_unsafe_route = true
